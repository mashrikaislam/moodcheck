<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>VibeCheck</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <h1> VibeCheck! </h1>
    <p>Describe your mood or what you're going through & get a book that fits.</p>
    <textarea id="mood" placeholder="e.g. I feel stuck and need something that makes me think differently..."></textarea>
    <button onclick="getRecommendation()">Find my book</button>
    <div id="result"></div>
    <div id="history"></div>
  </div>
  
  <script src="script.js"></script>
</body>
</html>
